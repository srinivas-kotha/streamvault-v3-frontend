<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- PWA / Silk fullscreen. On Fire TV Silk, "Add to Home Screen" will
         launch the app without browser chrome (URL bar hidden) because
         display:fullscreen is declared in the manifest. The apple-*
         metas cover iOS / Safari home-screen installs. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#12100e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StreamVault" />

    <title>StreamVault</title>

    <!-- Atomic-rollback marker. Vite injects the deploy_id at build time
         (see vite.config.ts). Used by support tooling to identify which
         build the user is on, and by the rollback drill to verify
         post-rollback state. Falls back to `dev` for local builds. -->
    <meta name="sv-deploy-id" content="%VITE_DEPLOY_ID%" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=optional"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
